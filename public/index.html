<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS — Network Topology Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/atlas.css" />
</head>
<body>
  <!-- ================================================================== -->
  <!-- Top Bar                                                             -->
  <!-- ================================================================== -->
  <header class="topbar">
    <div class="topbar-brand">
      <svg class="topbar-logo" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
        <circle cx="14" cy="6" r="2.5" fill="var(--accent)"/>
        <circle cx="6" cy="20" r="2.5" fill="var(--accent)"/>
        <circle cx="22" cy="20" r="2.5" fill="var(--accent)"/>
        <line x1="14" y1="6" x2="6" y2="20" stroke="var(--accent)" stroke-width="1.2"/>
        <line x1="14" y1="6" x2="22" y2="20" stroke="var(--accent)" stroke-width="1.2"/>
        <line x1="6" y1="20" x2="22" y2="20" stroke="var(--accent)" stroke-width="1.2"/>
      </svg>
      <h1 class="topbar-title">ATLAS</h1>
      <span class="topbar-subtitle">Topology Engine</span>
    </div>

    <div class="topbar-actions">
      <div class="topbar-status" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">No topology loaded</span>
      </div>
      <button class="btn btn-primary" id="btnCollect" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor" class="btn-icon">
          <path d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"/>
        </svg>
        Collect Topology
      </button>
      <button class="btn btn-ghost" id="btnManageDevices">
        <svg viewBox="0 0 20 20" fill="currentColor" class="btn-icon">
          <path fill-rule="evenodd" d="M2 5a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm14 1a1 1 0 11-2 0 1 1 0 012 0zM2 13a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2zm14 1a1 1 0 11-2 0 1 1 0 012 0z" clip-rule="evenodd"/>
        </svg>
        Devices
      </button>
    </div>
  </header>

  <!-- ================================================================== -->
  <!-- Path Analysis Bar                                                   -->
  <!-- ================================================================== -->
  <div class="path-bar" id="pathBar" style="display:none;">
    <div class="path-bar-section">
      <label class="path-label">Source</label>
      <select class="path-select" id="pathSource">
        <option value="">Select node...</option>
      </select>
    </div>
    <div class="path-bar-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>
    <div class="path-bar-section">
      <label class="path-label">Destination</label>
      <select class="path-select" id="pathDest">
        <option value="">Select node...</option>
      </select>
    </div>
    <div class="path-bar-divider"></div>
    <div class="path-bar-section">
      <label class="path-label">Node Failure</label>
      <select class="path-select" id="pathFailNode">
        <option value="">None</option>
      </select>
    </div>
    <div class="path-bar-section">
      <label class="path-label">Link Failure</label>
      <select class="path-select" id="pathFailLink">
        <option value="">None</option>
      </select>
    </div>
    <div class="path-bar-section">
      <label class="path-label">Algorithm</label>
      <select class="path-select" id="pathAlgo">
        <option value="0">Algo 0 (SPF)</option>
      </select>
    </div>
    <button class="btn btn-primary" id="btnComputePath">
      <svg viewBox="0 0 20 20" fill="currentColor" class="btn-icon">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd"/>
      </svg>
      Compute Path
    </button>
    <button class="btn btn-ghost btn-sm" id="btnClearPath" style="display:none;">Clear</button>
  </div>

  <!-- ================================================================== -->
  <!-- Main Content Area                                                   -->
  <!-- ================================================================== -->
  <main class="main-content">
    <!-- Topology Canvas -->
    <div class="topology-container" id="topologyContainer">
      <div class="topology-canvas" id="cy"></div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <svg class="empty-icon" viewBox="0 0 80 80" fill="none">
          <circle cx="20" cy="20" r="6" stroke="var(--text-muted)" stroke-width="1.5"/>
          <circle cx="60" cy="20" r="6" stroke="var(--text-muted)" stroke-width="1.5"/>
          <circle cx="40" cy="55" r="6" stroke="var(--text-muted)" stroke-width="1.5"/>
          <line x1="25" y1="23" x2="35" y2="52" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4 3"/>
          <line x1="55" y1="23" x2="45" y2="52" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4 3"/>
          <line x1="26" y1="20" x2="54" y2="20" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4 3"/>
        </svg>
        <h2>No Topology Loaded</h2>
        <p>Add a device and collect the IS-IS LSDB to visualize your network.</p>
        <button class="btn btn-primary" id="btnEmptyAddDevice">Add Your First Device</button>
      </div>

      <!-- Topology toolbar (zoom, layout, fit) -->
      <div class="topo-toolbar" id="topoToolbar" style="display:none;">
        <button class="topo-btn" id="btnFit" title="Fit to screen">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h4a1 1 0 010 2H5v3a1 1 0 01-2 0V4zm12-1a1 1 0 110 2h-3a1 1 0 110-2h3zM4 16a1 1 0 001 1h4a1 1 0 000-2H6v-3a1 1 0 00-2 0v4zm12-1v-3a1 1 0 00-2 0v3h-3a1 1 0 000 2h4a1 1 0 001-1z"/></svg>
        </button>
        <button class="topo-btn" id="btnZoomIn" title="Zoom in">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        </button>
        <button class="topo-btn" id="btnZoomOut" title="Zoom out">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 10a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
        </button>
        <div class="topo-divider"></div>
        <button class="topo-btn" id="btnLayoutCose" title="Force-directed layout">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zm0 8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zm6-6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zm2 6a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2h-2z"/></svg>
        </button>
      </div>
    </div>

    <!-- Detail Panel (slides in from right) -->
    <aside class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <h2 class="detail-title" id="detailTitle">Details</h2>
        <button class="btn-close" id="btnCloseDetail">&times;</button>
      </div>
      <div class="detail-body" id="detailBody">
        <!-- Populated dynamically -->
      </div>
    </aside>
  </main>

  <!-- ================================================================== -->
  <!-- Device Management Modal                                             -->
  <!-- ================================================================== -->
  <div class="modal-overlay" id="deviceModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Device Management</h2>
        <button class="btn-close" id="btnCloseModal">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Add device form -->
        <form class="device-form" id="addDeviceForm">
          <h3>Add Device</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="devName">Name</label>
              <input type="text" id="devName" placeholder="e.g. pe1" required />
            </div>
            <div class="form-group">
              <label for="devHost">Host / IP</label>
              <input type="text" id="devHost" placeholder="e.g. 10.0.0.1" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="devUser">Username</label>
              <input type="text" id="devUser" placeholder="admin" required />
            </div>
            <div class="form-group">
              <label for="devPass">Password</label>
              <input type="password" id="devPass" placeholder="password" required />
            </div>
            <div class="form-group form-group-sm">
              <label for="devPort">Port</label>
              <input type="number" id="devPort" value="443" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Add Device</button>
        </form>

        <!-- Device list -->
        <div class="device-list-section">
          <h3>Configured Devices</h3>
          <div class="device-list" id="deviceList">
            <p class="text-muted">No devices configured yet.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================================================================== -->
  <!-- Scripts                                                             -->
  <!-- ================================================================== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/topology.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
